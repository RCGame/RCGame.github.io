<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>JSON URL → Table</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="controls">
    <label>
      JSON endpoint:
      <input id="urlInput" type="url" value="https://rcgame.azurewebsites.net/api/GetLevelAchievementsD4j2Drb88fDaKfQb75P?from=2026-02-01" />
    </label>
    <fieldset class="endpoint-picker">
      <legend>Endpoint</legend>
      <label>
        <input
          type="radio"
          name="endpoint"
          value="https://rcgame.azurewebsites.net/api/GetLevelAchievementsD4j2Drb88fDaKfQb75P"
          checked
        />
        Level Achievements
      </label>
      <label>
        <input
          type="radio"
          name="endpoint"
          value="https://rcgame.azurewebsites.net/api/GetToolUsagewErh4ddiRgghd4vGGHJSwd"
        />
        Tool Usage
      </label>
    </fieldset>
    <div>
      <button id="fetchBtn" type="button">Fetch & Render</button>
      <button id="clearBtn" type="button">Clear</button>
    </div>
    <div id="status" class="status"></div>
  </div>

  <div id="output"></div>

  <script>
    (function setDefaultFromToYesterday() {
      const urlInput = document.getElementById("urlInput");
      if (!urlInput) return;

      try {
        const url = new URL(urlInput.value);
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yyyy = yesterday.getFullYear();
        const mm = String(yesterday.getMonth() + 1).padStart(2, "0");
        const dd = String(yesterday.getDate()).padStart(2, "0");
        url.searchParams.set("from", `${yyyy}-${mm}-${dd}`);
        urlInput.value = url.toString();
      } catch {}
    })();
  </script>
  <script src="shared-enums.js"></script>
  <script src="table-viewer.js"></script>
</body>
</html>
