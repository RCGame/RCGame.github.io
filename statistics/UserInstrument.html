<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>User Instrument Summary</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="controls">
    <label>
      JSON endpoint:
      <input id="urlInput" type="url" value="https://rcgame.azurewebsites.net/api/GetLevelAchievementsD4j2Drb88fDaKfQb75P?from=2026-01-01" />
    </label>
    <fieldset class="endpoint-picker">
      <legend>Mode</legend>
      <label>
        <input type="radio" name="summaryMode" value="users" checked />
        Users Count
      </label>
      <label>
        <input type="radio" name="summaryMode" value="sessions" />
        Sessions Count
      </label>
    </fieldset>
    <div>
      <button id="fetchBtn" type="button">Fetch & Render</button>
      <button id="clearBtn" type="button">Clear</button>
    </div>
    <div id="status" class="status"></div>
  </div>

  <div id="output"></div>

  <script src="user-instrument.js"></script>
</body>
</html>
